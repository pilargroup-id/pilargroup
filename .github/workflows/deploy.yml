name: Deploy pilargroup.id

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy to GCP
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # 1. Checkout
      # -------------------------
      - name: Checkout source
        uses: actions/checkout@v4

      # -------------------------
      # 2. Setup Node & build frontend
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies & build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      # -------------------------
      # 3. Setup SSH key
      # -------------------------
      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GCP_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.GCP_HOST }} >> ~/.ssh/known_hosts

      # -------------------------
      # 3.5 Debug SSH connection
      # -------------------------
      - name: Debug SSH connection
        run: |
          echo ">> Check DNS"
          nslookup ${{ secrets.GCP_HOST }}

          echo ">> Check generated public key from GitHub secret"
          ssh-keygen -y -f ~/.ssh/deploy_key

          echo ">> Test SSH verbose"
          ssh -vvv -o StrictHostKeyChecking=no -o IdentitiesOnly=yes -i ~/.ssh/deploy_key ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} "whoami && hostname"

      # -------------------------
      # 4. Pull latest code di VM (backend)
      # -------------------------
      - name: Pull latest code on VM
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} "
            set -e
            cd /var/www/pilargroup
            echo '>> Git pull'
            git pull origin main
          "

      # -------------------------
      # 5. Upload hasil build frontend ke VM
      # -------------------------
      - name: Upload frontend build to VM
        run: |
          scp -i ~/.ssh/deploy_key -r frontend/dist/* \
            ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }}:/var/www/pilargroup/frontend/dist/

      # -------------------------
      # 6. Install PHP deps & cache di VM
      # -------------------------
      - name: Finalize backend deploy on VM
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} "
            set -e
            cd /var/www/pilargroup/backend

            echo '>> Composer install'
            composer install --no-dev --optimize-autoloader --no-interaction

            echo '>> Clear Laravel cache'
            php artisan config:clear
            php artisan cache:clear
            php artisan optimize:clear

            echo '>> Rebuild Laravel cache'
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo '>> Reload nginx'
            sudo systemctl reload nginx

            echo '>> Deploy selesai'
          "